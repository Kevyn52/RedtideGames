<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redtide Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d10;
      --surface:   #10141a;
      --red:       #c0392b;
      --red-dim:   #7a1f16;
      --red-glow:  rgba(192, 57, 43, 0.18);
      --text:      #c8cdd6;
      --text-dim:  #525966;
      --text-faint:#272c34;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --mono:      'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
      mix-blend-mode: normal;
    }
    #cursor.hover {
      width: 28px; height: 28px;
      background: transparent;
      border: 1px solid var(--red);
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      background: linear-gradient(to bottom, rgba(11,13,16,0.95) 0%, transparent 100%);
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }
    .logo span { color: var(--red); }

    .nav-links {
      display: flex; gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 48px;
      position: relative;
      overflow: hidden;
    }

    /* animated tide lines */
    .tide-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* red gradient bleed */
    #hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -80px;
      width: 520px; height: 520px;
      background: radial-gradient(circle at 30% 70%, var(--red-glow) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.6 } to { opacity: 1 } }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 860px;
    }

    .hero-tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(3.2rem, 7vw, 6.8rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: #fff;
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--red);
    }

    .hero-sub {
      margin-top: 28px;
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--text-dim);
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 0.9s 0.65s forwards;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 52px;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--text-faint);
      padding-bottom: 6px;
      opacity: 0;
      animation: fadeUp 0.9s 0.85s forwards;
      transition: color 0.2s, border-color 0.2s;
    }
    .hero-cta:hover { color: var(--red); border-color: var(--red); }
    .hero-cta .arrow { transition: transform 0.2s; }
    .hero-cta:hover .arrow { transform: translateX(5px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 36px; right: 48px;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 1s 1.2s forwards;
    }
    .scroll-hint::after {
      content: '';
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, var(--text-faint), transparent);
      animation: scrollLine 2s 1.5s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51%  { transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }

    /* ── GAMES SECTION ── */
    #games {
      padding: 140px 48px 120px;
      position: relative;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red-dim);
      margin-bottom: 64px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
    }

    .game-card {
      position: relative;
      background: var(--surface);
      overflow: hidden;
      aspect-ratio: 16/9;
      display: flex;
      align-items: flex-end;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      group: true;
    }
    .game-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
      z-index: 1;
    }

    /* placeholder art bg per card */
    .game-card .art {
      position: absolute; inset: 0;
      z-index: 0;
      transition: transform 0.6s ease;
    }
    .game-card:hover .art { transform: scale(1.04); }

    .art-1 {
      background:
        radial-gradient(ellipse at 20% 80%, #3d0d08 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #0d1e3a 0%, transparent 50%),
        linear-gradient(135deg, #0a0c0f 0%, #141c28 100%);
    }
    .art-2 {
      background:
        radial-gradient(ellipse at 70% 60%, #1a0e2e 0%, transparent 55%),
        radial-gradient(ellipse at 30% 30%, #0d1a10 0%, transparent 50%),
        linear-gradient(135deg, #080b0e 0%, #111820 100%);
    }
    .art-3 {
      background:
        radial-gradient(ellipse at 50% 50%, #2a0e0b 0%, transparent 60%),
        linear-gradient(180deg, #050608 0%, #0f1117 100%);
    }

    /* floating geometric shapes per card */
    .art-shape {
      position: absolute;
      border: 1px solid rgba(192,57,43,0.15);
      border-radius: 50%;
    }
    .art-1 .art-shape {
      width: 200px; height: 200px;
      top: -40px; right: -40px;
      animation: rotate 20s linear infinite;
    }
    .art-2 .art-shape {
      width: 150px; height: 150px;
      bottom: 20px; left: 20px;
      border-radius: 0;
      transform: rotate(45deg);
      animation: rotate 14s linear infinite reverse;
    }
    .art-3 .art-shape {
      width: 120px; height: 120px;
      top: 30px; right: 60px;
      border-radius: 2px;
      animation: rotate 18s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    .game-info {
      position: relative;
      z-index: 2;
    }
    .game-tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
    }
    .game-title {
      font-size: 1.55rem;
      font-weight: 400;
      color: #fff;
      line-height: 1.1;
    }
    .game-desc {
      margin-top: 8px;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--text-dim);
      max-width: 280px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .game-card:hover .game-desc {
      opacity: 1;
      transform: translateY(0);
    }

    /* large "coming soon" card */
    .card-wip {
      grid-column: span 2;
      aspect-ratio: auto;
      min-height: 220px;
      border: 1px solid var(--text-faint);
      background: transparent;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      gap: 12px;
    }
    .card-wip::before { display: none; }
    .card-wip .wip-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .card-wip .wip-title {
      font-size: 1.8rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-faint);
    }
    .blink {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 10px;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

    /* ── ABOUT ── */
    #about {
      padding: 120px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
      border-top: 1px solid var(--text-faint);
    }

    h2 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      font-weight: 300;
      line-height: 1.15;
      color: #fff;
    }
    h2 em { font-style: italic; color: var(--text-dim); }

    .about-body {
      padding-top: 12px;
    }
    .about-body p {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .about-stats {
      display: flex;
      gap: 48px;
      margin-top: 48px;
      padding-top: 36px;
      border-top: 1px solid var(--text-faint);
    }
    .stat-num {
      font-size: 2.6rem;
      font-weight: 300;
      color: #fff;
      line-height: 1;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: 6px;
    }

    /* ── CONTACT ── */
    #contact {
      padding: 100px 48px 80px;
      border-top: 1px solid var(--text-faint);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .contact-heading {
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 300;
      color: #fff;
      margin-bottom: 16px;
    }
    .contact-sub {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-dim);
      margin-bottom: 40px;
    }

    .contact-link {
      font-size: 1.3rem;
      font-style: italic;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--text-faint);
      padding-bottom: 4px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-link:hover { color: var(--red); border-color: var(--red); }

    .socials {
      display: flex;
      gap: 28px;
      margin-top: 56px;
      list-style: none;
    }
    .socials a {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.2s;
    }
    .socials a:hover { color: var(--red); }

    /* ── FOOTER ── */
    footer {
      padding: 28px 48px;
      border-top: 1px solid var(--text-faint);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-copy {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--text-faint);
    }
    .footer-mark {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0.5;
    }

    /* ── INTERSECTION FADE ── */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 22px 24px; }
      .nav-links { display: none; }
      #hero, #games, #about, #contact, footer { padding-left: 24px; padding-right: 24px; }
      #about { grid-template-columns: 1fr; gap: 40px; }
      .card-wip { grid-column: span 1; }
    }
  </style>
</head>

  <script>
    // ── Custom cursor ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // ── Tide canvas animation ──
    const canvas = document.getElementById('tideCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const lines = Array.from({ length: 7 }, (_, i) => ({
      y: 0.3 + i * 0.1,
      speed: 0.0004 + i * 0.00008,
      amp: 18 + i * 6,
      freq: 0.0016 - i * 0.00008,
      phase: i * 1.1,
      alpha: 0.06 - i * 0.006,
      red: i < 2
    }));

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 1;
      lines.forEach(l => {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 2) {
          const y = l.y * H
            + Math.sin(x * l.freq + t * l.speed * 1000 + l.phase) * l.amp
            + Math.sin(x * l.freq * 1.7 + t * l.speed * 700 + l.phase * 2) * (l.amp * 0.4);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = l.red
          ? `rgba(192, 57, 43, ${l.alpha * 1.8})`
          : `rgba(180, 195, 220, ${l.alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      requestAnimationFrame(draw);
    }
    draw();

    // ── Reveal on scroll ──
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    reveals.forEach(r => observer.observe(r));
  </script>
